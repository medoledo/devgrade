{% extends 'base.html' %}

{% block title %}مشكلة في السيرفر | DevGrade{% endblock %}

{% block content %}
<section class="bg-dark-900 text-white py-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <h1 class="text-6xl md:text-8xl font-extrabold text-red-400 mb-4">500</h1>
        <h2 class="text-2xl md:text-3xl font-bold mb-4">حصلت مشكلة في السيرفر</h2>
        <p class="text-gray-400 text-lg max-w-xl mx-auto mb-8">الموقع وقع في مشكلة فنية مش متوقعة. الصفحة دي هتتصلح قريب. جرب ت刷新 الصفحة أو ارجع للرئيسية.</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'home' %}" class="inline-flex items-center justify-center bg-primary-500 hover:bg-primary-600 text-white font-bold py-3 px-8 rounded-lg transition">
                <svg class="w-5 h-5 me-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                الرئيسية
            </a>
            <button onclick="window.location.reload()" class="inline-flex items-center justify-center bg-white/10 hover:bg-white/20 text-white font-semibold py-3 px-8 rounded-lg transition backdrop-blur-sm">
                <svg class="w-5 h-5 me-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                حاول تاني
            </button>
        </div>
    </div>
</section>
{% endblock %}
