{% extends 'base.html' %}
{% load static %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<section class="bg-dark-900 text-white py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-2xl font-bold">Admin Login</h1>
        <p class="text-gray-400 text-sm mt-1">Sign in to access the dashboard.</p>
    </div>
</section>

<section class="py-16 bg-gray-50">
    <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-xl shadow-lg border border-gray-100 p-8">
            <div class="text-center mb-8">
                <img src="{% static 'images/devlogos.svg' %}" class="h-12 w-auto mx-auto mb-4" alt="DevGrade">
                <h2 class="text-xl font-bold text-dark-900">Welcome Back</h2>
                <p class="text-gray-500 text-sm mt-1">Staff members only</p>
            </div>

            <form method="post" action="{% url 'admin_login' %}">
                {% csrf_token %}
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none transition" placeholder="Enter your username">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 outline-none transition" placeholder="Enter your password">
                </div>
                <button type="submit" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-bold py-3 px-6 rounded-lg transition duration-200">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="{% url 'home' %}" class="text-sm text-gray-500 hover:text-primary-600 transition">Back to website</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
