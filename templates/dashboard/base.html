{% extends 'base.html' %}

{% block navbar %}{% endblock %}

{% block extra_head %}
<style>
    /* Kebab menu dropdown - global for all dashboard pages */
    .kebab-menu { position: relative; }
    .kebab-dropdown {
        position: absolute;
        top: 100%;
        right: 0;
        z-index: 50;
        min-width: 140px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        display: none;
        overflow: hidden;
    }
    .kebab-dropdown.active { display: block; }
    .kebab-dropdown button, .kebab-dropdown a {
        display: block;
        width: 100%;
        text-align: left;
        padding: 0.5rem 1rem;
        font-size: 0.875rem;
        color: #374151;
        background: none;
        border: none;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
    }
    .kebab-dropdown button:hover, .kebab-dropdown a:hover { background: #f3f4f6; }
    .kebab-dropdown .text-red-600:hover { background: #fef2f2; }

    /* Inline edit input */
    .inline-edit-input {
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        padding: 0.25rem 0.5rem;
        font-size: 0.875rem;
        width: 100%;
        outline: none;
    }
    .inline-edit-input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px #bbf7d0; }
</style>
{% endblock %}

{% block content %}
<!-- Admin Top Bar -->
<div class="bg-dark-900 text-white border-b border-gray-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-wrap items-center justify-between min-h-12 py-1 gap-y-2">
            <div class="flex flex-wrap items-center gap-3 sm:gap-6">
                <a href="{% url 'dashboard' %}" class="text-sm font-medium text-white hover:text-primary-400 transition">Dashboard</a>
                <a href="{% url 'dashboard_projects' %}" class="text-sm font-medium text-gray-300 hover:text-white transition">Projects</a>
                <a href="{% url 'dashboard_categories' %}" class="text-sm font-medium text-gray-300 hover:text-white transition">Categories</a>
                <a href="{% url 'home' %}" target="_blank" class="text-sm font-medium text-gray-300 hover:text-white transition">View Site</a>
            </div>
            <div class="flex flex-wrap items-center gap-2 sm:gap-4">
                <span class="text-sm text-gray-400">{{ request.user.username }}</span>
                <form method="post" action="{% url 'logout' %}" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-sm text-gray-300 hover:text-red-400 transition flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% block dashboard_content %}{% endblock %}

<script>
// Global kebab menu toggle
function toggleKebab(btn) {
    const menu = btn.nextElementSibling;
    if (!menu) return;
    const isActive = menu.classList.contains('active');
    // Close all others
    document.querySelectorAll('.kebab-dropdown').forEach(d => d.classList.remove('active'));
    if (!isActive) menu.classList.add('active');
}

// Close kebab menus when clicking outside
document.addEventListener('click', function(e) {
    if (!e.target.closest('.kebab-menu')) {
        document.querySelectorAll('.kebab-dropdown').forEach(d => d.classList.remove('active'));
    }
});

// Category inline edit helpers
function enableCatEdit(id) {
    document.querySelectorAll('.kebab-dropdown').forEach(d => d.classList.remove('active'));
    const text = document.getElementById('cat-name-' + id);
    const form = document.getElementById('cat-form-' + id);
    if (text && form) {
        text.classList.add('hidden');
        form.classList.remove('hidden');
        const input = form.querySelector('input');
        if (input) {
            input.focus();
            input.select();
        }
    }
}

function submitCatForm(id) {
    const form = document.getElementById('cat-form-' + id);
    if (form) form.submit();
}
</script>
{% endblock %}
