{% extends 'base.html' %}

{% block content %}
<!-- Admin Top Bar -->
<div class="bg-dark-900 text-white border-b border-gray-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-wrap items-center justify-between min-h-12 py-1 gap-y-2">
            <div class="flex flex-wrap items-center gap-3 sm:gap-6">
                <a href="{% url 'dashboard' %}" class="text-sm font-medium text-white hover:text-primary-400 transition">Dashboard</a>
                <a href="{% url 'dashboard_projects' %}" class="text-sm font-medium text-gray-300 hover:text-white transition">Projects</a>
                <a href="{% url 'home' %}" target="_blank" class="text-sm font-medium text-gray-300 hover:text-white transition">View Site</a>
                <a href="/admin/" class="text-sm font-medium text-gray-300 hover:text-white transition">Django Admin</a>
            </div>
            <div class="flex flex-wrap items-center gap-2 sm:gap-4">
                <span class="text-sm text-gray-400">{{ request.user.username }}</span>
                <form method="post" action="{% url 'logout' %}" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-sm text-gray-300 hover:text-red-400 transition flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                        </svg>
                        Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% block dashboard_content %}{% endblock %}
{% endblock %}
